name: Build and release installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_NAME: MindMapApp
  DISPLAY_NAME: Mindmap
  DOTNET_VERSION: '8.0.x'
  PROJECT_FILE: './MindMapApp.csproj'
  PACKAGE_NAME: 'mindmap'

jobs:
  build-windows-exe:
    name: Build Windows installer (.exe)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_FILE }}

      - name: Publish Windows
        run: dotnet publish ${{ env.PROJECT_FILE }} -c Release -r win-x64 --self-contained true -o ./publish/win-x64

      - name: Verify published files
        shell: pwsh
        run: |
          Get-ChildItem -Path ./publish/win-x64 -Recurse
          if (!(Test-Path "./publish/win-x64/MindMapApp.exe")) {
            throw "MindMapApp.exe introuvable dans publish/win-x64"
          }

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}"
            if ($version.StartsWith("v")) { $version = $version.Substring(1) }
          } else {
            $version = "0.1.0-manual.${{ github.run_number }}"
          }

          New-Item -ItemType Directory -Force -Path dist/windows | Out-Null

          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$version" `
            "/DMyAppName=${{ env.DISPLAY_NAME }}" `
            "packaging/windows/installer.iss"

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-installer
          path: dist/windows/*.exe
          if-no-files-found: error

  build-debian-deb:
    name: Build Debian package (.deb)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_FILE }}

      - name: Publish Linux
        run: dotnet publish ${{ env.PROJECT_FILE }} -c Release -r linux-x64 --self-contained true -o ./publish/linux-x64

      - name: Verify published files
        run: |
          ls -la ./publish/linux-x64
          test -f ./publish/linux-x64/MindMapApp

      - name: Build Debian package
        shell: bash
        run: |
          set -euxo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.1.0-manual.${GITHUB_RUN_NUMBER}"
          fi

          PKG_ROOT="pkgroot"
          PKG_NAME="${PACKAGE_NAME}"

          rm -rf "$PKG_ROOT" dist
          mkdir -p "$PKG_ROOT/DEBIAN"
          mkdir -p "$PKG_ROOT/opt/$PKG_NAME"
          mkdir -p "$PKG_ROOT/usr/bin"
          mkdir -p "$PKG_ROOT/usr/share/applications"
          mkdir -p "$PKG_ROOT/usr/share/icons/hicolor/256x256/apps"
          mkdir -p dist/linux

          cp -r ./publish/linux-x64/* "$PKG_ROOT/opt/$PKG_NAME/"
          chmod +x "$PKG_ROOT/opt/$PKG_NAME/MindMapApp"

          sed \
            -e "s/__VERSION__/$VERSION/g" \
            packaging/linux/control > "$PKG_ROOT/DEBIAN/control"

          # Assure une ligne vide finale pour le format Debian
          echo "" >> "$PKG_ROOT/DEBIAN/control"

          cp packaging/linux/mindmap.desktop "$PKG_ROOT/usr/share/applications/mindmap.desktop"

          if [ -f packaging/linux/icon.png ]; then
            cp packaging/linux/icon.png "$PKG_ROOT/usr/share/icons/hicolor/256x256/apps/mindmap.png"
          fi

          cat > "$PKG_ROOT/usr/bin/mindmap" << 'EOF'
          #!/bin/sh
          exec /opt/mindmap/MindMapApp "$@"
          EOF

          chmod 755 "$PKG_ROOT/usr/bin/mindmap"

          echo "===== CONTROL FILE ====="
          cat "$PKG_ROOT/DEBIAN/control"

          dpkg-deb --build "$PKG_ROOT" "dist/linux/mindmap_${VERSION}_amd64.deb"

      - name: Upload Debian package artifact
        uses: actions/upload-artifact@v6
        with:
          name: debian-package
          path: dist/linux/*.deb
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows-exe
      - build-debian-deb

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v5
        with:
          name: windows-installer
          path: release-assets/windows

      - name: Download Debian artifact
        uses: actions/download-artifact@v5
        with:
          name: debian-package
          path: release-assets/linux

      - name: Show downloaded files
        run: find release-assets -maxdepth 3 -type f | sort

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets/checksums

          find release-assets -type f \( -name "*.exe" -o -name "*.deb" \) | while read -r file; do
            base="$(basename "$file")"
            sha256sum "$file" > "release-assets/checksums/${base}.sha256"
          done

          echo "===== CHECKSUMS ====="
          cat release-assets/checksums/*.sha256

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || format('Manual build {0}', github.run_number) }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ github.ref_type != 'tag' }}
          files: |
            release-assets/windows/*.exe
            release-assets/linux/*.deb
            release-assets/checksums/*.sha256